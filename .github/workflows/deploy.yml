name: Deploy Coming Soon to Production

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy-coming-soon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Coming Soon page to production
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: production
          publish_dir: ./coming-soon
          force_orphan: true
          cname: sonjaspeicher-custodia.com
