<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon — Mallorca</title>
    <meta name="description" content="A bespoke settlement &amp; property care service for Mallorca. Coming soon." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --gold: #C4A77D;
        --gold-dark: #8B7355;
        --bg: #FAF8F5;
        --dark: #1A1A1A;
        --text: #2D2D2D;
        --muted: #6B6B6B;
        --light-bg: #F5F2ED;
      }

      html, body {
        height: 100%;
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::selection {
        background-color: var(--gold);
        color: #fff;
      }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--light-bg); }
      ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

      /* Layout */
      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
        overflow: hidden;
        animation: fadeIn 1.2s ease forwards;
      }

      /* Subtle background texture */
      .page::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% 0%, rgba(196,167,125,0.07) 0%, transparent 70%),
          radial-gradient(ellipse 60% 40% at 80% 100%, rgba(196,167,125,0.05) 0%, transparent 60%);
        pointer-events: none;
      }

      .container {
        max-width: 640px;
        width: 100%;
        text-align: center;
        position: relative;
        z-index: 1;
      }

      /* Top ornament */
      .ornament {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 3rem;
        opacity: 0;
        animation: slideUp 0.9s ease 0.3s forwards;
      }

      .ornament-line {
        height: 1px;
        width: 60px;
        background: linear-gradient(to right, transparent, var(--gold));
      }

      .ornament-line.right {
        background: linear-gradient(to left, transparent, var(--gold));
      }

      .ornament-diamond {
        width: 6px;
        height: 6px;
        background: var(--gold);
        transform: rotate(45deg);
        flex-shrink: 0;
      }

      .ornament-dot {
        width: 3px;
        height: 3px;
        background: var(--gold-dark);
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* Location label */
      .location {
        font-family: 'Inter', sans-serif;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: slideUp 0.9s ease 0.45s forwards;
      }

      /* Main heading */
      h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 400;
        font-size: clamp(3rem, 8vw, 5.5rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--dark);
        margin-bottom: 0.25em;
        opacity: 0;
        animation: slideUp 0.9s ease 0.6s forwards;
      }

      h1 em {
        font-style: italic;
        color: var(--gold-dark);
      }

      /* Subtitle */
      .subtitle {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: clamp(1.1rem, 2.5vw, 1.4rem);
        color: var(--muted);
        font-weight: 400;
        margin-bottom: 2.5rem;
        opacity: 0;
        animation: slideUp 0.9s ease 0.75s forwards;
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin: 0 auto 2.5rem;
        max-width: 200px;
        opacity: 0;
        animation: slideUp 0.9s ease 0.9s forwards;
      }

      .divider-line {
        flex: 1;
        height: 1px;
        background: var(--gold);
        opacity: 0.4;
      }

      .divider-mark {
        width: 4px;
        height: 4px;
        background: var(--gold);
        transform: rotate(45deg);
        flex-shrink: 0;
      }

      /* Body text */
      .body-text {
        font-size: 0.9375rem;
        font-weight: 300;
        line-height: 1.8;
        color: var(--muted);
        max-width: 440px;
        margin: 0 auto;
        opacity: 0;
        animation: slideUp 0.9s ease 1.05s forwards;
      }

      /* Footer */
      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 1.5rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        opacity: 0;
        animation: fadeIn 1s ease 1.4s forwards;
      }

      footer p {
        font-size: 0.75rem;
        font-weight: 400;
        letter-spacing: 0.08em;
        color: var(--gold-dark);
        opacity: 0.6;
      }

      .legal-links {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        color: var(--gold-dark);
        opacity: 0.5;
      }

      .legal-links a {
        color: inherit;
        text-decoration: none;
        transition: opacity 0.2s ease, color 0.2s ease;
      }

      .legal-links a:hover {
        color: var(--gold);
        opacity: 1;
      }

      .legal-links span {
        opacity: 0.5;
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Responsive */
      @media (max-width: 480px) {
        .ornament-line { width: 40px; }
        .body-text { font-size: 0.875rem; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="container">

        <div class="ornament">
          <span class="ornament-line"></span>
          <span class="ornament-dot"></span>
          <span class="ornament-diamond"></span>
          <span class="ornament-dot"></span>
          <span class="ornament-line right"></span>
        </div>

        <p class="location">Mallorca</p>

        <h1>Coming<br /><em>Soon</em></h1>

        <p class="subtitle">Something beautiful is on its way.</p>

        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-mark"></span>
          <span class="divider-line"></span>
        </div>

        <p class="body-text">
          A bespoke settlement &amp; private property care service
          for those making Mallorca their home.
          <br /><br />
          We will be with you shortly.
        </p>

      </div>
    </div>

    <footer>
      <p>Mallorca &nbsp;&mdash;&nbsp; Est. 2025</p>
      <nav class="legal-links" aria-label="Legal">
        <a href="/preview/#impressum">Imprint</a>
        <span aria-hidden="true">&middot;</span>
        <a href="/preview/#datenschutz">Privacy</a>
      </nav>
    </footer>
  </body>
</html>
